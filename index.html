<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caza de Limones | Pro Edition</title>
  <link rel="stylesheet" href="limones.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body onload="iniciar()">

  <div class="contenedor">
    <header>
      <h1>ATRAPAR LIMONES</h1>
      <p class="frase">"Si del cielo te caen limones, haz limonada..."</p>
    </header>

    <div class="juego-wrapper">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </div>
    
    <div class="panel-stats">
      <div class="stat-box">
        <span class="label">PUNTAJE</span>
        <span id="txtPuntaje" class="value">0</span>
      </div>
      <div class="stat-box">
        <span class="label">VIDAS</span>
        <span id="txtVidas" class="value highlight">3</span>
      </div>
    </div>

    <div class="botones">
      <button class="btn-nav" onclick="moverIzquierda()">← IZQUIERDA</button>
      <button class="btn-action">REINICIAR</button>
      <button class="btn-nav" onclick="moverDerecha()">DERECHA →</button>
    </div>

    <footer>
      <p>Developer: <strong>Ian Mera</strong></p>
    </footer>
  </div>

  <script src="limones.js"></script>
  <script src="utilis.js"></script>
</body>
</html>
